<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>payment — viachaz studio</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232a2e3d'/%3E%3Cpath d='M6 8 L16 24 L26 8' stroke='%233f5f8f' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='16' cy='24' r='2.5' fill='%23e65045'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#3f5f8f;--blue-dk:#2e4a72;--coral:#e65045;
  --ink:#2a2e3d;--body:#525f7a;--muted:#8a8f9e;
  --lav:#dbe2f0;--bg:#f6f2ea;--white:#ffffff;
  --rule:rgba(82,95,122,0.12);
}
html,body{min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:58px;display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;background:rgba(246,242,234,.96);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--rule);
}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--ink);text-decoration:none}
.nav-logo em{font-style:italic;color:var(--blue)}
.nav-back{font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);text-decoration:none;border:1px solid rgba(63,95,143,.3);padding:.42rem 1rem;border-radius:2px;transition:all .2s}
.nav-back:hover{background:var(--blue);color:#fff}

.page{max-width:520px;margin:0 auto;padding:94px 24px 80px}

/* PLAN SELECTOR */
.plan-selector{margin-bottom:24px}
.plan-label{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:12px;display:block}
.plan-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:3px;overflow:hidden}
.plan-tab{
  background:var(--white);border:none;padding:.7rem .5rem;
  font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:500;
  letter-spacing:.04em;color:var(--body);cursor:pointer;
  transition:background .15s,color .15s;text-align:center;line-height:1.3;
}
.plan-tab:hover{background:var(--lav)}
.plan-tab.active{background:var(--ink);color:#fff}
.plan-tab .tab-price{display:block;font-family:'Playfair Display',serif;font-size:.95rem;color:inherit;margin-top:2px}
.plan-tab.active .tab-price{color:rgba(219,226,240,.7)}

/* PRODUCT CARD */
.product-card{
  background:var(--ink);border-radius:4px;padding:28px 32px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.product-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--coral))}
.product-eyebrow{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(219,226,240,.5);font-weight:500;margin-bottom:6px}
.product-name{font-family:'Playfair Display',serif;font-size:1.15rem;color:#fff;margin-bottom:8px}
.product-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.product-price{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:400;color:#fff;line-height:1}
.product-price sup{font-size:1.2rem;vertical-align:super;font-family:'DM Sans',sans-serif;font-weight:300;opacity:.7}
.product-tagline{font-size:.82rem;color:rgba(219,226,240,.5);font-weight:300;font-style:italic;line-height:1.55;margin-bottom:12px}
.product-recurring{font-size:.75rem;color:rgba(219,226,240,.4);font-weight:300;line-height:1.4;margin-bottom:12px}
.product-recurring strong{color:rgba(219,226,240,.65);font-weight:500}
.product-trial{display:inline-block;font-size:.65rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);background:rgba(63,95,143,.15);padding:.3rem .7rem;border-radius:2px;margin-bottom:14px}
.product-divider{height:1px;background:rgba(219,226,240,.12);margin:14px 0}
.product-includes{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.product-includes li{font-size:.8rem;color:rgba(219,226,240,.65);font-weight:300;padding-left:1.2rem;position:relative;line-height:1.55}
.product-includes li::before{content:'—';color:rgba(63,95,143,.8);position:absolute;left:0;font-size:.72rem;line-height:1.65}
.product-note{font-size:.74rem;color:rgba(219,226,240,.3);font-weight:300;line-height:1.6;font-style:italic}

/* FORM CARD */
.form-card{background:var(--white);border:1px solid var(--rule);border-radius:4px;padding:32px}
.form-label{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.form-label::after{content:'';flex:1;height:1px;background:var(--rule)}
.field{margin-bottom:16px}
.field label{display:block;font-size:.72rem;font-weight:500;letter-spacing:.04em;color:var(--ink);margin-bottom:6px}
.field input{
  width:100%;background:var(--bg);border:1px solid rgba(82,95,122,0.18);border-radius:2px;
  color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:300;
  padding:11px 14px;outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(63,95,143,.08);background:var(--white)}
.field input::placeholder{color:var(--muted);font-weight:300}

.btn-pay{
  width:100%;background:var(--blue);color:#fff;border:none;border-radius:2px;padding:1rem;
  font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:background .2s;margin-top:4px;
}
.btn-pay:hover{background:var(--blue-dk)}
.btn-pay:disabled{opacity:.5;cursor:not-allowed}
.pay-note{text-align:center;font-size:.7rem;color:var(--muted);font-weight:300;margin-top:10px}

footer{text-align:center;padding:28px 24px;font-size:.7rem;color:var(--muted);font-weight:300;border-top:1px solid var(--rule)}
footer a{color:var(--blue);text-decoration:none}
.footer-links{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.footer-sep{color:var(--rule);font-size:.8rem}
.footer-sub{font-size:.68rem;color:var(--muted)}

@media(max-width:480px){
  .page{padding:82px 16px 60px}
  .form-card{padding:22px 16px}
  .product-card{padding:22px 20px}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="https://viachaz.com">viachaz <em>studio</em></a>
  <a class="nav-back" href="https://viachaz.com">← back</a>
</nav>

<div class="page">

  <!-- PLAN SELECTOR -->
  <div class="plan-selector">
    <span class="plan-label">select your plan</span>
    <div class="plan-tabs">
      <button class="plan-tab active" onclick="selectPlan('onepage', this)">
        the presence
        <span class="tab-price">$500</span>
      </button>
      <button class="plan-tab" onclick="selectPlan('custom', this)">
        the authority
        <span class="tab-price">from $1,000</span>
      </button>
    </div>
  </div>

  <!-- PRODUCT CARD -->
  <div class="product-card">
    <div class="product-eyebrow" id="card-eyebrow"></div>
    <div class="product-name" id="card-name"></div>
    <div class="product-price-row">
      <div class="product-price" id="card-price"></div>
    </div>
    <p class="product-tagline" id="card-tagline"></p>
    <div class="product-recurring" id="card-recurring"></div>
    <span class="product-trial" id="card-trial"></span>
    <div class="product-divider"></div>
    <ul class="product-includes" id="card-includes"></ul>
    <p class="product-note" id="card-note"></p>
  </div>

  <!-- FORM CARD -->
  <div class="form-card">
    <div class="form-label">your details</div>
    <form id="pay-form" onsubmit="handleSubmit(event)">
      <div class="field">
        <label for="first-name">first name</label>
        <input type="text" id="first-name" placeholder="jane" autocomplete="given-name" required>
      </div>
      <div class="field">
        <label for="email">email</label>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email" required>
      </div>
      <button type="submit" class="btn-pay" id="pay-btn">continue →</button>
      <p class="pay-note">card details collected securely on stripe</p>
    </form>
  </div>

</div>

<footer>
  <div class="footer-links">
    <a href="https://viachaz.com">viachaz.com</a>
    <span class="footer-sep">·</span>
    <a href="https://viachaz.com/launch">site intake form</a>
    <span class="footer-sep">·</span>
    <a href="https://viachaz.com/refer">refer &amp; earn</a>
    <span class="footer-sep">·</span>
    <a href="https://methodwithai.com">method with ai</a>
    <span class="footer-sep">·</span>
    <a href="https://mygradpage.com">my grad page</a>
  </div>
  <div class="footer-sub">questions? text <a href="sms:+14803522549">(480) 352-2549</a> or email <a href="mailto:chaz@viachaz.com">chaz@viachaz.com</a></div>
</footer>
<script>
var plans = {
  onepage: {
    eyebrow: 'one-page site + google business profile',
    name: 'the presence',
    tagline: 'they land, understand, & call.',
    price: '<sup>$</sup>500',
    recurring: '<strong>$25/month</strong> — first month free',
    trial: 'first month hosting free',
    includes: [
      'custom-coded around your business — no templates',
      'what you do, what it costs, how to reach you — clear in seconds',
      'call button always visible on every screen',
      'google business profile setup or cleanup',
      'apple business connect setup',
      'mobile-first, fast on any device',
      'live preview before you pay anything',
      'delivered in 24 hours'
    ],
    note: 'one new client covers it. $25/month hosting after your first free month. cancel anytime by text — no lock-ins.',
    link: 'https://buy.stripe.com/bJeeV56glf7M0R689t08g07'
  },
  custom: {
    eyebrow: 'custom multi-page build + google business profile',
    name: 'the authority',
    tagline: "when one page isn't enough.",
    price: '<sup>$</sup>1,000+',
    recurring: '<strong>$25/month</strong> — first month free',
    trial: 'first month hosting free',
    includes: [
      'multiple pages built around how your business actually runs',
      'deeper structure — gallery, booking, forms, or portfolios',
      'google business profile setup or cleanup',
      'apple business connect setup',
      'scoped & priced before we start — no surprises',
      'live preview before you pay anything',
      'text chaz if your project was quoted differently'
    ],
    note: 'this link charges the $1,000 base. if your build was scoped at a different price, text before paying.',
    link: 'https://buy.stripe.com/4gMcMX6glgbQ6bqahB08g08'
  }
};

var currentPlan = 'onepage';

function renderPlan(plan) {
  document.getElementById('card-eyebrow').textContent  = plan.eyebrow;
  document.getElementById('card-name').textContent     = plan.name;
  document.getElementById('card-tagline').textContent  = plan.tagline;
  document.getElementById('card-price').innerHTML      = plan.price;
  document.getElementById('card-recurring').innerHTML  = plan.recurring;
  document.getElementById('card-trial').textContent    = plan.trial;
  document.getElementById('card-note').textContent     = plan.note;
  var ul = document.getElementById('card-includes');
  ul.innerHTML = '';
  plan.includes.forEach(function(item) {
    var li = document.createElement('li');
    li.textContent = item;
    ul.appendChild(li);
  });
}

function selectPlan(key, btn) {
  currentPlan = key;
  document.querySelectorAll('.plan-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  renderPlan(plans[key]);
}

function handleSubmit(e) {
  e.preventDefault();
  var firstName = document.getElementById('first-name').value.trim();
  var email     = document.getElementById('email').value.trim();
  if (!firstName || !email) return;
  var btn = document.getElementById('pay-btn');
  btn.disabled    = true;
  btn.textContent = 'redirecting…';
  var link = plans[currentPlan].link + '?prefilled_email=' + encodeURIComponent(email);
  setTimeout(function(){ window.location.href = link; }, 400);
}

renderPlan(plans[currentPlan]);
</script>
</body>
</html>
